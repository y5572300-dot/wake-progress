<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#fdf7fa">
<title>Wake Progress</title>
<style>
  :root {
    --bg: #f7f6fb;
    --card: #ffffff;
    --card-head: #fbfaff;
    --text: #3a3550;
    --muted: #9a94ad;
    --track: #eeecf5;
    --shadow: 0 2px 10px rgba(90, 80, 140, .08);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(180deg, #fdf7fa 0%, var(--bg) 220px);
    color: var(--text);
    padding: 20px 14px calc(48px + env(safe-area-inset-bottom));
  }
  .wrap { max-width: 860px; margin: 0 auto; }
  h1 {
    text-align: center;
    font-size: 26px;
    margin: 4px 0 4px;
    letter-spacing: .3px;
    color: #4a4266;
  }
  .sync {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    margin: 0 0 16px;
    min-height: 15px;
  }
  .sync.ok { color: #6cb98a; }

  /* Вкладки */
  .tabs {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 22px;
    position: sticky;
    top: 8px;
    z-index: 10;
  }
  .tab-btn {
    padding: 12px 6px;
    font-size: 16px;
    font-weight: 700;
    font-family: inherit;
    color: var(--p-dark);
    background: var(--p-soft);
    border: 2px solid transparent;
    border-radius: 14px;
    cursor: pointer;
    transition: all .2s;
    box-shadow: var(--shadow);
    min-height: 46px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .tab-btn.active {
    color: #fff;
    background: var(--p-accent);
    border-color: var(--p-accent);
    box-shadow: 0 4px 14px var(--p-glow);
  }
  .tab-btn.add {
    color: var(--muted);
    background: transparent;
    border: 2px dashed #d4cfe3;
    box-shadow: none;
    font-size: 20px;
    font-weight: 400;
  }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Общий прогресс человека */
  .total {
    background: var(--card);
    border-radius: 16px;
    padding: 16px 18px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
    border-top: 4px solid var(--p-accent);
  }
  .total .label {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 10px;
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .total .label b { color: var(--text); font-size: 16px; }

  /* Блок курса */
  details.block {
    background: var(--card);
    border-radius: 16px;
    margin-bottom: 14px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  details.block > summary {
    list-style: none;
    cursor: pointer;
    padding: 14px 16px;
    background: var(--card-head);
  }
  details.block > summary::-webkit-details-marker { display: none; }
  .block-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 10px;
  }
  .block-title {
    font-size: 17px;
    font-weight: 700;
    color: #4a4266;
  }
  .block-title .arrow {
    display: inline-block;
    transition: transform .2s;
    margin-right: 8px;
    color: var(--p-accent);
    font-size: 13px;
  }
  details[open] .block-title .arrow { transform: rotate(90deg); }
  .block-count {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
  }

  /* Прогресс-бар */
  .bar {
    height: 10px;
    background: var(--track);
    border-radius: 6px;
    overflow: hidden;
  }
  .bar .fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--p-accent), var(--p-accent2));
    border-radius: 6px;
    transition: width .3s ease;
  }
  .bar.big { height: 14px; border-radius: 8px; }

  .block-body { padding: 6px 10px 14px; }
  .group-title {
    font-size: 12px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: .8px;
    color: var(--p-dark);
    margin: 16px 8px 6px;
  }
  .note {
    font-size: 13px;
    color: var(--muted);
    margin: 10px 8px 4px;
    font-style: italic;
  }

  /* Упражнение */
  label.ex {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 10px;
    border-radius: 10px;
    cursor: pointer;
    transition: background .15s;
    font-size: 15px;
    min-height: 44px;
  }
  @media (hover: hover) {
    label.ex:hover { background: var(--p-soft); }
  }
  label.ex:active { background: var(--p-soft); }
  label.ex input {
    appearance: none;
    -webkit-appearance: none;
    width: 24px;
    height: 24px;
    min-width: 24px;
    margin: 0;
    border: 2px solid #cfcadd;
    border-radius: 8px;
    background: #fff;
    cursor: pointer;
    position: relative;
    transition: all .15s;
  }
  label.ex input:checked {
    background: var(--p-accent);
    border-color: var(--p-accent);
  }
  label.ex input:checked::after {
    content: "✓";
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 15px;
    font-weight: 800;
  }
  label.ex input:checked + span {
    color: var(--muted);
    text-decoration: line-through;
  }
  label.ex span { flex: 1; }
  .rm-trick {
    background: none;
    border: none;
    color: #d0c9df;
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    padding: 6px 8px;
    border-radius: 8px;
  }
  .rm-trick:active { color: #c74d4d; }
  @media (hover: hover) { .rm-trick:hover { color: #c74d4d; } }

  /* Кнопка добавления трюка */
  .add-trick {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    margin-top: 8px;
    padding: 10px;
    min-height: 44px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    color: var(--muted);
    background: transparent;
    border: 2px dashed #ddd7ea;
    border-radius: 10px;
    cursor: pointer;
    transition: all .15s;
  }
  .add-trick .plus {
    width: 24px;
    height: 24px;
    min-width: 24px;
    border-radius: 8px;
    border: 2px dashed #cfcadd;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 400;
  }
  @media (hover: hover) {
    .add-trick:hover { color: var(--p-dark); border-color: var(--p-accent2); }
  }
  .add-trick:active { color: var(--p-dark); border-color: var(--p-accent2); }

  .remove-person {
    display: block;
    margin: 6px auto 0;
    background: none;
    border: none;
    font-family: inherit;
    font-size: 13px;
    color: var(--muted);
    text-decoration: underline;
    cursor: pointer;
    padding: 10px;
  }

  /* Раздел PRO */
  .pro-section { margin-top: 26px; }
  .pro-lock {
    background: linear-gradient(135deg, #46406b, #6b5a94);
    border-radius: 16px;
    padding: 26px 20px;
    text-align: center;
    color: #fff;
    box-shadow: var(--shadow);
  }
  .pro-lock-icon { font-size: 34px; margin-bottom: 6px; }
  .pro-lock-title { font-size: 22px; font-weight: 800; letter-spacing: 3px; color: #f0d48a; margin-bottom: 8px; }
  .pro-lock-note { font-size: 14px; color: rgba(255,255,255,.85); line-height: 1.5; margin-bottom: 14px; }
  .pro-lock-note b { color: #f0d48a; }
  .pro-lock-bar { background: rgba(255,255,255,.18); max-width: 320px; margin: 0 auto; }
  .pro-lock-bar .fill { background: linear-gradient(90deg, #f0d48a, #ffec9e); }
  .pro-open-head {
    text-align: center;
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 2px;
    color: #b8963f;
    margin: 4px 0 14px;
  }
  .pro-placeholder { text-align: center; padding: 10px 0 20px; }

  /* Модальные окна */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(60, 50, 90, .35);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .overlay.open { display: flex; }
  .dialog {
    background: #fff;
    border-radius: 18px;
    padding: 22px 20px;
    width: 100%;
    max-width: 360px;
    box-shadow: 0 12px 40px rgba(60, 50, 90, .25);
  }
  .dialog h2 { margin: 0 0 14px; font-size: 18px; color: #4a4266; text-align: center; }
  .dialog .sub { font-size: 13px; color: var(--muted); text-align: center; margin: -8px 0 14px; }
  .dialog input[type="text"] {
    width: 100%;
    font-family: inherit;
    font-size: 16px;
    padding: 12px 14px;
    border: 2px solid #e2ddef;
    border-radius: 12px;
    outline: none;
    color: var(--text);
  }
  .dialog input[type="text"]:focus { border-color: #b7aee0; }
  .swatches {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin: 16px 0 4px;
  }
  .swatch {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 3px solid transparent;
    cursor: pointer;
    padding: 0;
  }
  .swatch.selected { border-color: #4a4266; }
  .dialog-btns {
    display: flex;
    gap: 10px;
    margin-top: 18px;
  }
  .dialog-btns button {
    flex: 1;
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    padding: 12px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    min-height: 46px;
  }
  .btn-cancel { background: #f0edf7; color: var(--muted); }
  .btn-ok { background: #4a4266; color: #fff; }
  .dialog .err { color: #d14f4f; font-size: 13px; min-height: 16px; margin: 8px 0 0; text-align: center; }

  /* Мобильная адаптация */
  @media (max-width: 600px) {
    body { padding-left: 10px; padding-right: 10px; }
    h1 { font-size: 20px; }
    .tabs { grid-template-columns: repeat(3, 1fr); }
    .tab-btn { font-size: 15px; padding: 12px 4px; }
    .block-title { font-size: 16px; }
    .block-count { font-size: 11px; }
    .block-body { padding: 4px 6px 12px; }
    label.ex { font-size: 14px; padding: 12px 8px; }
    .total { padding: 14px 14px; }
  }
  @media (max-width: 360px) {
    .tab-btn { font-size: 14px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>🏄‍♀️ Wake Progress</h1>
  <div class="sync" id="sync-status"></div>

  <div class="tabs" id="tabs"></div>
  <div id="panels"></div>
</div>

<div class="overlay" id="add-overlay">
  <div class="dialog">
    <h2>Новая вкладка</h2>
    <input type="text" id="add-name" placeholder="Имя" maxlength="14">
    <div class="swatches" id="add-swatches"></div>
    <div class="err" id="add-err"></div>
    <div class="dialog-btns">
      <button class="btn-cancel" id="add-cancel">Отмена</button>
      <button class="btn-ok" id="add-ok">Добавить</button>
    </div>
  </div>
</div>

<div class="overlay" id="trick-overlay">
  <div class="dialog">
    <h2>Новый трюк</h2>
    <div class="sub" id="trick-sub"></div>
    <input type="text" id="trick-name" placeholder="Название трюка" maxlength="60">
    <div class="err" id="trick-err"></div>
    <div class="dialog-btns">
      <button class="btn-cancel" id="trick-cancel">Отмена</button>
      <button class="btn-ok" id="trick-ok">Добавить</button>
    </div>
  </div>
</div>

      { name: "Скольжение по сложным фигурам", items: ["Узкий слайдер (линейка)","Круглая фигура (труба)","Меняющая наклон резко (rooftop)","Меняющая наклон плавно (слон)","Трансфер с заезда (funbox)","Трансферный переход (rail-to-rail)","Бассейн"] }
    ]
  }
];

// Раздел PRO: блоки добавим позже; открывается при 90% общего прогресса
const PRO_COURSE = [];
const PRO_UNLOCK = 90;

// ------- Хранилище: облако (Firebase) + локальный кеш -------
const DB_URL = "https://wake-progress-default-rtdb.europe-west1.firebasedatabase.app";
const STORAGE_KEY = "wake-progress-v1";
const PENDING_KEY = "wake-progress-pending-v1";
const PEOPLE_KEY = "wake-progress-people-v1";
const TRICKS_KEY = "wake-progress-tricks-v1";
const ACTIVE_KEY = "wake-progress-active-tab";

let state = {};        // текущие отметки: ключ -> true
let pending = {};      // не отправленные в облако изменения: ключ -> true | null
let customPeople = {}; // добавленные вкладки: id -> {name, palette, created}
let customTricks = {}; // добавленные трюки: id -> {block, name, created}
try { state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch (e) { state = {}; }
try { pending = JSON.parse(localStorage.getItem(PENDING_KEY)) || {}; } catch (e) { pending = {}; }
try { customPeople = JSON.parse(localStorage.getItem(PEOPLE_KEY)) || {}; } catch (e) { customPeople = {}; }
try { customTricks = JSON.parse(localStorage.getItem(TRICKS_KEY)) || {}; } catch (e) { customTricks = {}; }

let checkboxRefs = {}; // ключ -> элемент чекбокса

function saveLocal() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  localStorage.setItem(PENDING_KEY, JSON.stringify(pending));
  localStorage.setItem(PEOPLE_KEY, JSON.stringify(customPeople));
  localStorage.setItem(TRICKS_KEY, JSON.stringify(customTricks));
}

// Firebase запрещает в ключах символы . $ # [ ] / — кодируем
function encKey(k) { return encodeURIComponent(k).replace(/\./g, "%2E"); }

const syncEl = document.getElementById("sync-status");
function setSync(text, ok) {
  syncEl.textContent = text;
  syncEl.className = "sync" + (ok ? " ok" : "");
}
const MSG_OK = "✓ синхронизировано";
const MSG_QUEUE = "нет сети — отметки сохранятся и отправятся позже";

function allPeople() {
  const custom = Object.keys(customPeople).map(id => {
    const p = customPeople[id] || {};
    return { id: id, name: p.name, palette: p.palette || 0, created: p.created || 0 };
  }).filter(p => p.name).sort((a, b) => a.created - b.created);
  return BASE_PEOPLE.map(p => ({ id: null, name: p.name, palette: p.palette })).concat(custom);
}

function tricksOf(blockId) {
  return Object.keys(customTricks).map(id => {
    const t = customTricks[id] || {};
    return { id: id, block: t.block, name: t.name, created: t.created || 0 };
  }).filter(t => t.block === blockId && t.name).sort((a, b) => a.created - b.created);
}

async function flush() {
  const snapshot = Object.assign({}, pending);
  const keys = Object.keys(snapshot);
  if (!keys.length) return true;
  const body = {};
  keys.forEach(k => { body[encKey(k)] = snapshot[k]; });
  try {
    const r = await fetch(DB_URL + "/state.json", { method: "PATCH", body: JSON.stringify(body) });
    if (!r.ok) throw new Error(r.status);
    keys.forEach(k => { if (pending[k] === snapshot[k]) delete pending[k]; });
    saveLocal();
    return true;
  } catch (e) {
    return false;
  }
}

let peopleSig = JSON.stringify(customPeople);
let tricksSig = JSON.stringify(customTricks);

async function pull() {
  try {
    const r = await fetch(DB_URL + "/.json");
    if (!r.ok) throw new Error(r.status);
    const data = (await r.json()) || {};

    // список вкладок и добавленные трюки
    const remotePeople = data.people || {};
    const remoteTricks = data.tricks || {};
    const pSig = JSON.stringify(remotePeople);
    const tSig = JSON.stringify(remoteTricks);
    if (pSig !== peopleSig || tSig !== tricksSig) {
      peopleSig = pSig;
      tricksSig = tSig;
      customPeople = remotePeople;
      customTricks = remoteTricks;
      buildUI();
    }

    // отметки
    const remoteRaw = ("state" in data) ? data.state : null;
    if (remoteRaw === null && Object.keys(state).length) {
      // облако пустое, а локально отметки есть — заливаем их наверх
      Object.keys(state).forEach(k => { pending[k] = true; });
    } else {
      const remote = {};
      if (remoteRaw) Object.keys(remoteRaw).forEach(ek => {
        if (remoteRaw[ek]) remote[decodeURIComponent(ek)] = true;
      });
      state = remote;
      Object.keys(pending).forEach(k => {
        if (pending[k]) state[k] = true; else delete state[k];
      });
    }
    saveLocal();
    renderState();
    const ok = await flush();
    setSync(ok ? MSG_OK : MSG_QUEUE, ok);
  } catch (e) {
    setSync("нет сети — отметки сохраняются на этом устройстве", false);
  }
}

function renderState() {
  Object.keys(checkboxRefs).forEach(k => { checkboxRefs[k].checked = !!state[k]; });
  allPeople().forEach(p => updateProgress(p.name));
}

function exKey(person, blockId, group, item) {
  return person + "|" + blockId + "|" + group + "|" + item;
}

function slug(s) {
  return s.replace(/[^a-zA-Zа-яА-Я0-9]+/g, "-");
}

function applyTheme(el, pal) {
  el.style.setProperty("--p-accent", pal.accent);
  el.style.setProperty("--p-accent2", pal.accent2);
  el.style.setProperty("--p-soft", pal.soft);
  el.style.setProperty("--p-dark", pal.dark);
  el.style.setProperty("--p-glow", pal.glow);
}

// ------- Рендер вкладок и панелей -------
const tabsEl = document.getElementById("tabs");
const panelsEl = document.getElementById("panels");

function makeExerciseRow(person, key, text, trickId) {
  const label = document.createElement("label");
  label.className = "ex";
  const cb = document.createElement("input");
  cb.type = "checkbox";
  cb.checked = !!state[key];
  checkboxRefs[key] = cb;
  cb.addEventListener("change", () => {
    if (cb.checked) { state[key] = true; pending[key] = true; }
    else { delete state[key]; pending[key] = null; }
    saveLocal();
    updateProgress(person);
    flush().then(ok => setSync(ok ? MSG_OK : MSG_QUEUE, ok));
  });
  const span = document.createElement("span");
  span.textContent = text;
  label.appendChild(cb);
  label.appendChild(span);
  if (trickId) {
    const rm = document.createElement("button");
    rm.className = "rm-trick";
    rm.textContent = "✕";
    rm.title = "Удалить трюк";
    rm.addEventListener("click", e => {
      e.preventDefault();
      e.stopPropagation();
      removeTrick(trickId, text);
    });
    label.appendChild(rm);
  }
  return label;
}

function makeBlock(person, block) {
  const det = document.createElement("details");
  det.className = "block";

  const summary = document.createElement("summary");
  summary.innerHTML =
    '<div class="block-head">' +
      '<div class="block-title"><span class="arrow">▶</span>' + block.title + '</div>' +
      '<div class="block-count" id="count-' + slug(person) + '-' + block.id + '"></div>' +
    '</div>' +
    '<div class="bar"><div class="fill" id="fill-' + slug(person) + '-' + block.id + '"></div></div>';
  det.appendChild(summary);

  const body = document.createElement("div");
  body.className = "block-body";

  if (block.note) {
    const n = document.createElement("div");
    n.className = "note";
    n.textContent = block.note;
    body.appendChild(n);
  }

  block.groups.forEach(group => {
    const gt = document.createElement("div");
    gt.className = "group-title";
    gt.textContent = group.name;
    body.appendChild(gt);

    group.items.forEach(item => {
      const key = exKey(person, block.id, group.name, item);
      body.appendChild(makeExerciseRow(person, key, item, null));
    });
  });

  // добавленные трюки этого блока
  const extra = tricksOf(block.id);
  if (extra.length) {
    const gt = document.createElement("div");
    gt.className = "group-title";
    gt.textContent = CUSTOM_GROUP;
    body.appendChild(gt);
    extra.forEach(t => {
      const key = exKey(person, block.id, CUSTOM_GROUP, t.name);
      body.appendChild(makeExerciseRow(person, key, t.name, t.id));
    });
  }

  // кнопка добавления трюка
  const addBtn = document.createElement("button");
  addBtn.className = "add-trick";
  addBtn.innerHTML = '<span class="plus">+</span><span>Добавить трюк</span>';
  addBtn.addEventListener("click", () => openTrickDialog(block));
  body.appendChild(addBtn);

  det.appendChild(body);
  return det;
}

function activateTab(name) {
  localStorage.setItem(ACTIVE_KEY, name);
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b.dataset.person === name));
  document.querySelectorAll(".tab-panel").forEach(el => el.classList.toggle("active", el.dataset.person === name));
}

function buildUI() {
  tabsEl.innerHTML = "";
  panelsEl.innerHTML = "";
  checkboxRefs = {};

  const people = allPeople();
  const savedActive = localStorage.getItem(ACTIVE_KEY);
  const activeName = people.some(p => p.name === savedActive) ? savedActive : people[0].name;

  // вкладок может стать больше четырёх — расширяем сетку
  const cols = Math.min(people.length + 1, window.matchMedia("(max-width: 600px)").matches ? 3 : 5);
  tabsEl.style.gridTemplateColumns = "repeat(" + cols + ", 1fr)";

  people.forEach(p => {
    const pal = PALETTES[p.palette % PALETTES.length];
    const person = p.name;

    const btn = document.createElement("button");
    btn.className = "tab-btn" + (person === activeName ? " active" : "");
    btn.textContent = person;
    btn.dataset.person = person;
    applyTheme(btn, pal);
    btn.addEventListener("click", () => activateTab(person));
    tabsEl.appendChild(btn);

    const panel = document.createElement("div");
    panel.className = "tab-panel" + (person === activeName ? " active" : "");
    panel.dataset.person = person;
    panel.id = "panel-" + slug(person);
    applyTheme(panel, pal);

    const total = document.createElement("div");
    total.className = "total";
    total.innerHTML =
      '<div class="label"><b>Общий прогресс — ' + person + '</b><span id="total-txt-' + slug(person) + '"></span></div>' +
      '<div class="bar big"><div class="fill" id="total-fill-' + slug(person) + '"></div></div>';
    panel.appendChild(total);

    COURSE.forEach(block => panel.appendChild(makeBlock(person, block)));

    // Раздел PRO — под замком до 90% общего прогресса
    const pro = document.createElement("div");
    pro.className = "pro-section";
    const lock = document.createElement("div");
    lock.className = "pro-lock";
    lock.id = "pro-lock-" + slug(person);
    lock.innerHTML =
      '<div class="pro-lock-icon">🔒</div>' +
      '<div class="pro-lock-title">PRO</div>' +
      '<div class="pro-lock-note">Раздел откроется, когда общий прогресс достигнет ' + PRO_UNLOCK + '%.<br>Сейчас — <b id="pro-pct-' + slug(person) + '">0%</b></div>' +
      '<div class="bar pro-lock-bar"><div class="fill" id="pro-lockfill-' + slug(person) + '"></div></div>';
    pro.appendChild(lock);

    const proContent = document.createElement("div");
    proContent.className = "pro-content";
    proContent.id = "pro-content-" + slug(person);
    proContent.style.display = "none";
    const proHead = document.createElement("div");
    proHead.className = "pro-open-head";
    proHead.textContent = "⭐ PRO открыт!";
    proContent.appendChild(proHead);
    if (PRO_COURSE.length) {
      PRO_COURSE.forEach(block => proContent.appendChild(makeBlock(person, block)));
    } else {
      const ph = document.createElement("div");
      ph.className = "note pro-placeholder";
      ph.textContent = "Блоки раздела PRO скоро появятся здесь.";
      proContent.appendChild(ph);
    }
    pro.appendChild(proContent);
    panel.appendChild(pro);

    // удаление — только для добавленных вкладок
    if (p.id) {
      const rm = document.createElement("button");
      rm.className = "remove-person";
      rm.textContent = "Удалить вкладку «" + person + "»";
      rm.addEventListener("click", () => removePerson(p.id, person));
      panel.appendChild(rm);
    }

    panelsEl.appendChild(panel);
    updateProgress(person);
  });

  // кнопка добавления вкладки
  const add = document.createElement("button");
  add.className = "tab-btn add";
  add.textContent = "+";
  add.title = "Добавить вкладку";
  add.addEventListener("click", openAddDialog);
  tabsEl.appendChild(add);
}

function blockStats(person, block) {
  let done = 0, all = 0;
  block.groups.forEach(group => {
    group.items.forEach(item => {
      all++;
      if (state[exKey(person, block.id, group.name, item)]) done++;
    });
  });
  tricksOf(block.id).forEach(t => {
    all++;
    if (state[exKey(person, block.id, CUSTOM_GROUP, t.name)]) done++;
  });
  return { done: done, all: all };
}

function updateProgress(person) {
  let totalDone = 0, totalAll = 0;
  const totalFill = document.getElementById("total-fill-" + slug(person));
  if (!totalFill) return;
  COURSE.forEach(block => {
    const s = blockStats(person, block);
    totalDone += s.done;
    totalAll += s.all;
    const pct = s.all ? Math.round(s.done / s.all * 100) : 0;
    document.getElementById("fill-" + slug(person) + "-" + block.id).style.width = pct + "%";
    document.getElementById("count-" + slug(person) + "-" + block.id).textContent = s.done + " / " + s.all + " · " + pct + "%";
  });
  const tpct = totalAll ? Math.round(totalDone / totalAll * 100) : 0;
  totalFill.style.width = tpct + "%";
  document.getElementById("total-txt-" + slug(person)).textContent = totalDone + " / " + totalAll + " · " + tpct + "%";

  // PRO-блоки: свои прогресс-бары, в общий прогресс не входят
  PRO_COURSE.forEach(block => {
    const fill = document.getElementById("fill-" + slug(person) + "-" + block.id);
    if (!fill) return;
    const s = blockStats(person, block);
    const pct = s.all ? Math.round(s.done / s.all * 100) : 0;
    fill.style.width = pct + "%";
    document.getElementById("count-" + slug(person) + "-" + block.id).textContent = s.done + " / " + s.all + " · " + pct + "%";
  });

  // замок раздела PRO
  const lockEl = document.getElementById("pro-lock-" + slug(person));
  if (lockEl) {
    const unlocked = tpct >= PRO_UNLOCK;
    lockEl.style.display = unlocked ? "none" : "";
    document.getElementById("pro-content-" + slug(person)).style.display = unlocked ? "" : "none";
    document.getElementById("pro-pct-" + slug(person)).textContent = tpct + "%";
    document.getElementById("pro-lockfill-" + slug(person)).style.width = Math.min(100, Math.round(tpct / PRO_UNLOCK * 100)) + "%";
  }
}

// ------- Добавление и удаление трюков -------
const trickOverlay = document.getElementById("trick-overlay");
const trickNameInput = document.getElementById("trick-name");
const trickSub = document.getElementById("trick-sub");
const trickErr = document.getElementById("trick-err");
let trickBlock = null;

function openTrickDialog(block) {
  trickBlock = block;
  trickErr.textContent = "";
  trickNameInput.value = "";
  trickSub.textContent = "В блок «" + block.title + "» — появится у всех.";
  trickOverlay.classList.add("open");
  setTimeout(() => trickNameInput.focus(), 50);
}

document.getElementById("trick-cancel").addEventListener("click", () => trickOverlay.classList.remove("open"));
trickOverlay.addEventListener("click", e => { if (e.target === trickOverlay) trickOverlay.classList.remove("open"); });
trickNameInput.addEventListener("keydown", e => { if (e.key === "Enter") document.getElementById("trick-ok").click(); });

document.getElementById("trick-ok").addEventListener("click", async () => {
  if (!trickBlock) return;
  const name = trickNameInput.value.trim().replace(/\|/g, " ");
  if (!name) { trickErr.textContent = "Введите название"; return; }
  const lower = name.toLowerCase();
  const inCourse = trickBlock.groups.some(g => g.items.some(i => i.toLowerCase() === lower));
  const inCustom = tricksOf(trickBlock.id).some(t => t.name.toLowerCase() === lower);
  if (inCourse || inCustom) { trickErr.textContent = "Такой трюк уже есть в этом блоке"; return; }
  const id = "t" + Date.now();
  const entry = { block: trickBlock.id, name: name, created: Date.now() };
  try {
    const r = await fetch(DB_URL + "/tricks/" + id + ".json", { method: "PUT", body: JSON.stringify(entry) });
    if (!r.ok) throw new Error(r.status);
  } catch (e) {
    trickErr.textContent = "Нет сети — попробуйте позже";
    return;
  }
  customTricks[id] = entry;
  tricksSig = JSON.stringify(customTricks);
  saveLocal();
  trickOverlay.classList.remove("open");
  buildUI();
  setSync(MSG_OK, true);
});

async function removeTrick(id, name) {
  const t = customTricks[id];
  if (!t) return;
  if (!confirm("Удалить трюк «" + name + "»? Он исчезнет у всех вместе с отметками.")) return;
  try {
    const r = await fetch(DB_URL + "/tricks/" + id + ".json", { method: "DELETE" });
    if (!r.ok) throw new Error(r.status);
  } catch (e) {
    alert("Нет сети — попробуйте позже");
    return;
  }
  // стираем отметки этого трюка у всех
  allPeople().forEach(p => {
    const key = exKey(p.name, t.block, CUSTOM_GROUP, t.name);
    if (state[key]) delete state[key];
    pending[key] = null;
  });
  delete customTricks[id];
  tricksSig = JSON.stringify(customTricks);
  saveLocal();
  buildUI();
  flush();
}

// ------- Добавление и удаление вкладок -------
const overlay = document.getElementById("add-overlay");
const nameInput = document.getElementById("add-name");
const swatchesEl = document.getElementById("add-swatches");
const errEl = document.getElementById("add-err");
let chosenPalette = 4;

function openAddDialog() {
  errEl.textContent = "";
  nameInput.value = "";
  chosenPalette = 4;
  swatchesEl.innerHTML = "";
  PALETTES.forEach((pal, i) => {
    const s = document.createElement("button");
    s.className = "swatch" + (i === chosenPalette ? " selected" : "");
    s.style.background = pal.accent;
    s.addEventListener("click", () => {
      chosenPalette = i;
      swatchesEl.querySelectorAll(".swatch").forEach((el, j) => el.classList.toggle("selected", j === i));
    });
    swatchesEl.appendChild(s);
  });
  overlay.classList.add("open");
  setTimeout(() => nameInput.focus(), 50);
}

document.getElementById("add-cancel").addEventListener("click", () => overlay.classList.remove("open"));
overlay.addEventListener("click", e => { if (e.target === overlay) overlay.classList.remove("open"); });

document.getElementById("add-ok").addEventListener("click", async () => {
  const name = nameInput.value.trim().replace(/\|/g, " ");
  if (!name) { errEl.textContent = "Введите имя"; return; }
  const exists = allPeople().some(p => p.name.toLowerCase() === name.toLowerCase());
  if (exists) { errEl.textContent = "Такая вкладка уже есть"; return; }
  const id = "p" + Date.now();
  const entry = { name: name, palette: chosenPalette, created: Date.now() };
  try {
    const r = await fetch(DB_URL + "/people/" + id + ".json", { method: "PUT", body: JSON.stringify(entry) });
    if (!r.ok) throw new Error(r.status);
  } catch (e) {
    errEl.textContent = "Нет сети — попробуйте позже";
    return;
  }
  customPeople[id] = entry;
  peopleSig = JSON.stringify(customPeople);
  saveLocal();
  overlay.classList.remove("open");
  buildUI();
  activateTab(name);
  setSync(MSG_OK, true);
});

nameInput.addEventListener("keydown", e => { if (e.key === "Enter") document.getElementById("add-ok").click(); });

async function removePerson(id, name) {
  if (!confirm("Удалить вкладку «" + name + "» вместе со всеми отметками? Это увидят все.")) return;
  try {
    const r = await fetch(DB_URL + "/people/" + id + ".json", { method: "DELETE" });
    if (!r.ok) throw new Error(r.status);
  } catch (e) {
    alert("Нет сети — попробуйте позже");
    return;
  }
  // стираем отметки этого человека
  Object.keys(state).forEach(k => {
    if (k.indexOf(name + "|") === 0) { delete state[k]; pending[k] = null; }
  });
  delete customPeople[id];
  peopleSig = JSON.stringify(customPeople);
  localStorage.setItem(ACTIVE_KEY, allPeople()[0].name);
  saveLocal();
  buildUI();
  flush();
}

// ------- Запуск -------
buildUI();
pull();
setInterval(pull, 20000);
window.addEventListener("online", pull);
document.addEventListener("visibilitychange", () => { if (!document.hidden) pull(); });
</script>
